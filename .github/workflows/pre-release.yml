# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: CI

on:
  push:
    branches-ignore:
    - develop
    - release/*
    - master
    paths-ignore:
    - '**/README.md'
    - '**/docs'
    - '.github/**'
    - "docs/**"
    - ".git/*"
    - ".vs/*"
    - ".config/*"
    - ".github/*"
    - "Directory.Build.props"
    - "Directory.Build.targets"
    - "Directory.Build.props"
    - "docker-compose.yml"
    - "docker-compose.override.yml"
    - "docker-compose.vs.debug.yml"
    - "docker-compose.vs.release.yml"
    - "docker-compose.dcrpoj"
    - "**/*.sln"
    - "global.json"
    - "IdentityServer8.DotNet.ruleset"
    - "LICENSCE"
    - "Nuget.config"
    - "SECURITY.md"
    - "SPONSORS.md"
    - "README.md"
    - "samples"
    - "nuget"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [macOS-latest, ubuntu-latest, windows-latest]
    name: ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    steps:
    - uses: actions/checkout@v3
      with:        
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x


    - uses: dotnet/nbgv@master
      id: nbgv

    - name: Display Package Version
      run: echo "PackageVersion=${{ steps.nbgv.outputs.SimpleVersion }}-ci.${{ steps.nbgv.outputs.VersionRevision }}"



    - name: Restore dependencies
      run: dotnet restore src/IdentityServer10.sln
    # The <Version> in Directory.Build.props is the source of truth for the package version.
    # Do NOT override it via -p:Version=... from nbgv: if nbgv returns empty/0.0.0 the build
    # silently produces 0.0.0 packages.
    - name: Build
      run: dotnet build src/IdentityServer10.sln --configuration Release --no-restore
    - name: Test
      run: dotnet test src/IdentityServer10.sln --configuration Release --no-build --verbosity normal /p:CollectCoverage=true --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      env:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: omarbaruzzo/IdentityServer10
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

